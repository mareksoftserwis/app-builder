name: appbuilderPRO Engine

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nazwa aplikacji'
        required: true
      app_id:
        description: 'ID (np. com.pro.app)'
        required: true
      html_code:
        description: 'Zaszyfrowany kod HTML'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Inject User Code
        run: |
          mkdir -p www
          echo "${{ github.event.inputs.html_code }}" | base64 --decode > www/index.html
          echo '{"appId": "${{ github.event.inputs.app_id }}", "appName": "${{ github.event.inputs.app_name }}", "webDir": "www"}' > capacitor.config.json

      # ... (reszta kroków instalacji i naprawy NFC, które przygotowaliśmy wcześniej)
