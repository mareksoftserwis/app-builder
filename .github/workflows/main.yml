name: appbuilderPRO Engine

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nazwa aplikacji'
        required: true
      app_id:
        description: 'ID (np. com.pro.app)'
        required: true
      html_code:
        description: 'Zaszyfrowany kod HTML (Base64)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize App Project
        run: |
          mkdir -p www
          # Dekodowanie kodu z interfejsu
          echo "${{ github.event.inputs.html_code }}" | base64 --decode > www/index.html
          
          # Dynamiczne tworzenie konfiguracji (Fix błędu Missing appId)
          echo '{"appId": "${{ github.event.inputs.app_id }}", "appName": "${{ github.event.inputs.app_name }}", "webDir": "www"}' > capacitor.config.json
          
          # Instalacja rdzenia systemu
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          
          # Automatyczne dodanie NFC jeśli wykryto w kodzie
          if grep -q "nfc" www/index.html; then 
            echo "Wykryto potrzebę NFC. Instaluję wtyczkę..."
            npm install phonegap-nfc
          fi

      - name: Native Android Fixes
        run: |
          npx cap add android
          
          # Naprawa błędu kompilacji wtyczki NFC (Namespace Fix)
          GRADLE_FILE="android/capacitor-cordova-android-plugins/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i '/android {/a \    namespace "com.chariotsolutions.nfc.plugin"' "$GRADLE_FILE"
          fi
          
          # Fix SDK 34 (Usuwa błąd o niebezpiecznej aplikacji ze screena)
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' android/variables.gradle
          
          npx cap sync android

      - name: Final Compilation (APK)
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
