name: Build Android APK (Capacitor + NFC)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install phonegap-nfc
          
          # BEZPIECZNIK: Naprawa błędu ze screena 1000038589.jpg
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "<html><body><h1>Temporary Build</h1></body></html>" > www/index.html
          fi

      - name: Capacitor Add & Sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Build Android App (APK)
        run: |
          cd android
          # Naprawa uprawnień do pliku budującego
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
