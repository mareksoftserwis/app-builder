name: AppMint Compiler (Web2App)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nazwa Twojej aplikacji'
        required: true
        default: 'Moja Nowa Apka'
      use_nfc:
        description: 'Czy dodać wsparcie NFC? (true/false)'
        required: true
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Environment (Node & Java)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Workspace
        run: |
          mkdir -p www
          # Tutaj Twój AppBuilder kopiuje dostarczony kod HTML do folderu www
          # Jeśli folder input_code istnieje, nadpisuje domyślne index.html
          if [ -d "input_code" ]; then cp -r input_code/* www/; fi

      - name: Dynamic Dependencies
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          # AUTOMATYCZNA INIEKCJA NFC:
          if [ "${{ github.event.inputs.use_nfc }}" == "true" ] || grep -q "nfc" www/index.html; then
            echo "Wykryto potrzebę NFC. Instaluję wtyczkę..."
            npm install phonegap-nfc
            echo "NFC_ENABLED=true" >> $GITHUB_ENV
          fi

      - name: Capacitor Init & Sync
        run: |
          npx cap add android
          # Dynamiczna zmiana nazwy aplikacji w konfiguracji
          sed -i 's/"appName": ".*"/"appName": "${{ github.event.inputs.app_name }}"/' capacitor.config.json
          npx cap sync android

      - name: Native Injection (NFC & SDK Fix)
        if: env.NFC_ENABLED == 'true'
        run: |
          # 1. Naprawa Namespace dla wtyczki (aby uniknąć błędów kompilacji)
          PLUGIN_GRADLE="android/capacitor-cordova-android-plugins/build.gradle"
          if [ -f "$PLUGIN_GRADLE" ]; then
            sed -i '/android {/a \    namespace "com.chariotsolutions.nfc.plugin"' "$PLUGIN_GRADLE"
          fi
          
          # 2. Wstrzyknięcie uprawnień do AndroidManifest.xml
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.NFC" />' "$MANIFEST"
          sed -i '/<application/i \    <uses-feature android:name="android.hardware.nfc" android:required="true" />' "$MANIFEST"
          
          # 3. Ustawienie SDK 34 (aby nie było błędu "stara wersja")
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' android/variables.gradle

      - name: Final Compile (APK)
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload Generated App
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
