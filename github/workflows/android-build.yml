name: Build Android APK (Capacitor + NFC)

on:
  push:
    branches: [ main ] # Skrypt odpali się przy każdym wypchnięciu kodu na gałąź main
  workflow_dispatch: # Pozwala odpalić budowanie ręcznie w zakładce Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Instalacja popularnej wtyczki NFC
          npm install phonegap-nfc 
          npx cap update

      - name: Build Web Assets
        run: |
          # Jeśli masz skrypt budujący (np. Vite/Webpack), odpal go tutaj. 
          # Jeśli masz czysty HTML w folderze /www, ten krok można pominąć lub zostawić:
          mkdir -p www
          # npm run build 

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Build Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
