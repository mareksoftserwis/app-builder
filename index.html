<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scanner</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 400px; border: 1px solid #444; }
        button { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 20px; color: #aaa; font-size: 14px; min-height: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Generator NFC</h2>
        <p>Zbliż kartę lub tag po kliknięciu.</p>
        <button onclick="startScanning()">SKANUJ TERAZ</button>
        <div id="status">Status: Gotowy</div>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const status = document.getElementById('status');

        function startScanning() {
            if (typeof nfc === "undefined") {
                status.innerText = "Błąd: Plugin NFC nie jest gotowy. Uruchom na Androidzie.";
                return;
            }

            status.innerText = "Szukam tagu... Zbliż urządzenie.";

            nfc.addTagDiscoveredListener(
                (event) => {
                    const tagId = nfc.bytesToHexString(event.tag.id);
                    status.innerHTML = "<b>Sukces!</b><br>ID: " + tagId;
                    alert("Wykryto NFC: " + tagId);
                },
                () => { console.log("Skaner aktywny"); },
                (error) => { status.innerText = "Błąd czytnika: " + error; }
            );
        }
    </script>
</body>
</html>
