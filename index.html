<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>appbuilderPRO - Panel Sterowania</title>
    <style>
        :root { --accent: #00d1b2; --bg: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 400px; background: #1a1a1a; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        textarea { flex-grow: 1; background: #000; color: #00ff00; border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 12px; margin: 10px 0; resize: none; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .btn { background: var(--accent); color: black; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .preview { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; }
        iframe { width: 360px; height: 640px; background: white; border: 12px solid #333; border-radius: 30px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        #status { font-size: 12px; margin-top: 10px; color: var(--accent); text-align: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>appbuilderPRO</h2>
        <input type="text" id="appName" placeholder="Nazwa aplikacji (np. MojaApka)">
        <input type="text" id="appId" placeholder="ID (np. com.pro.builder)">
        <label>Wklej kod HTML/CSS/JS aplikacji:</label>
        <textarea id="code" placeholder="<html>..."></textarea>
        <button class="btn" onclick="triggerBuild()">URUCHOM BUDOWANIE APK</button>
        <div id="status">Gotowy do pracy</div>
    </div>
    <div class="preview">
        <div style="margin-bottom:10px; color: #555;">PODGLĄD NA ŻYWO</div>
        <iframe id="live"></iframe>
    </div>

    <script>
        const codeInput = document.getElementById('code');
        const liveFrame = document.getElementById('live');
        const status = document.getElementById('status');

        codeInput.addEventListener('input', () => {
            const doc = liveFrame.contentWindow.document;
            doc.open(); doc.write(codeInput.value); doc.close();
        });

        async function triggerBuild() {
            const name = document.getElementById('appName').value;
            const id = document.getElementById('appId').value;
            const code = codeInput.value;
            
            // --- TUTAJ WPISZ SWOJE DANE ---
            const token = "TWÓJ_TOKEN_PAT"; 
            const owner = "TWÓJ_NICK_GITHUB";
            const repo = "NAZWA_REPO";

            if(!name || !id || !code) { alert("Wypełnij wszystkie pola!"); return; }
            status.innerText = "Wysyłanie do silnika GitHub...";

            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/app-generator.yml/dispatches`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ ref: 'main', inputs: { app_name: name, app_id: id, html_code: btoa(unescape(encodeURIComponent(code))) } })
                });
                if(res.ok) { status.innerText = "✅ SILNIK ODPALONY! Sprawdź Actions na GitHub."; }
                else { status.innerText = "❌ Błąd połączenia z GitHub API."; }
            } catch (e) { status.innerText = "❌ Błąd krytyczny: " + e.message; }
        }
    </script>
</body>
</html>
