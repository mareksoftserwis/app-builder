<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h1>NFC Scanner</h1>
        <p>Zbliż tag NFC do telefonu po uruchomieniu skanowania.</p>
        <button onclick="startNfc()">Uruchom czytnik NFC</button>
        <div id="status">Status: Oczekiwanie...</div>
    </div>

    <!-- Kluczowy skrypt Capacitora - generowany automatycznie podczas budowania -->
    <script src="capacitor.js"></script>
    
    <script>
        function log(msg) {
            document.getElementById('status').innerText = "Status: " + msg;
        }

        async function startNfc() {
            try {
                log("Inicjalizacja...");
                
                // Sprawdzamy czy wtyczka NFC jest dostępna
                if (typeof nfc === "undefined") {
                    log("Błąd: Wtyczka NFC nie została znaleziona!");
                    return;
                }

                // Nasłuchiwanie na tagi NFC
                nfc.addTagDiscoveredListener(
                    function(nfcEvent) {
                        const tag = nfcEvent.tag;
                        const tagId = nfc.bytesToHexString(tag.id);
                        log("Wykryto tag! ID: " + tagId);
                        alert("Odczytano NFC ID: " + tagId);
                    },
                    function() { log("Czytnik aktywny. Czekam na tag..."); },
                    function(error) { log("Błąd startu: " + error); }
                );

            } catch (err) {
                log("Błąd krytyczny: " + err);
            }
        }
    </script>
</body>
</html>
