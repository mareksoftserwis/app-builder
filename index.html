<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC App</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #eef2f7; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 25px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Czytnik NFC</h2>
        <button onclick="initNfc()">SKANUJ TAG</button>
        <div id="status">Gotowy do pracy</div>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const statusDiv = document.getElementById('status');

        function initNfc() {
            if (typeof nfc === "undefined") {
                statusDiv.innerText = "Błąd: Brak wtyczki NFC (uruchom na telefonie)";
                return;
            }

            statusDiv.innerText = "Szukam tagu... Zbliż kartę.";

            nfc.addTagDiscoveredListener(
                function(nfcEvent) {
                    const id = nfc.bytesToHexString(nfcEvent.tag.id);
                    statusDiv.innerText = "Znaleziono: " + id;
                    alert("ID Tagu: " + id);
                },
                function() { console.log("Listener aktywny"); },
                function(err) { statusDiv.innerText = "Błąd: " + err; }
            );
        }
    </script>
</body>
</html>
